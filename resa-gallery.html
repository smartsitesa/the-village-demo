  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox-close" type="button" aria-label="Close gallery">×</button>
    <button class="lightbox-nav prev" type="button" aria-label="Previous image">‹</button>
    <div class="lightbox-stage">
      <img id="lightbox-image" src="" alt="" />
      <p id="lightbox-caption"></p>
    </div>
    <button class="lightbox-nav next" type="button" aria-label="Next image">›</button>
  </div>

  <script>
    window.SMARTSITE_GA4_ID = 'G-XXXXXXXXXX';
  </script>
  <script src="tracking-snippet.js"></script>
  <script>
    (function () {
      const triggers = Array.from(document.querySelectorAll('.gallery-trigger'));
      const lightbox = document.getElementById('lightbox');
      const lightboxImage = document.getElementById('lightbox-image');
      const lightboxCaption = document.getElementById('lightbox-caption');
      const closeBtn = document.querySelector('.lightbox-close');
      const prevBtn = document.querySelector('.lightbox-nav.prev');
      const nextBtn = document.querySelector('.lightbox-nav.next');
      let currentIndex = 0;

      const items = triggers.map((trigger) => ({
        src: trigger.dataset.galleryImage,
        altAf: trigger.dataset.galleryAltAf || '',
        altEn: trigger.dataset.galleryAltEn || ''
      }));

      function render(index) {
        const item = items[index];
        lightboxImage.src = item.src;
        lightboxImage.alt = item.altAf;
        lightboxCaption.textContent = item.altAf;
        currentIndex = index;
      }

      function openLightbox(index) {
        render(index);
        lightbox.classList.add('open');
        lightbox.setAttribute('aria-hidden', 'false');
        document.body.classList.add('lightbox-open');
      }

      function closeLightbox() {
        lightbox.classList.remove('open');
        lightbox.setAttribute('aria-hidden', 'true');
        document.body.classList.remove('lightbox-open');
      }

      function showNext(step) {
        const nextIndex = (currentIndex + step + items.length) % items.length;
        render(nextIndex);
      }

      triggers.forEach((trigger, index) => {
        trigger.addEventListener('click', () => openLightbox(index));
      });

      closeBtn.addEventListener('click', closeLightbox);
      prevBtn.addEventListener('click', () => showNext(-1));
      nextBtn.addEventListener('click', () => showNext(1));

      lightbox.addEventListener('click', (event) => {
        if (event.target === lightbox) closeLightbox();
      });
    })();
  </script>
